
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><?= htmlspecialchars($config['site_name']) ?> - <?= htmlspecialchars($config['tagline']) ?></title>
    <meta name="description" content="<?= htmlspecialchars($config['description']) ?>">
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
                         "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #0b0f19;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ===== Animated Background ===== */
        .bg-glow {
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(56,139,253,0.15) 0%, rgba(56,139,253,0.05) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* ===== Header / Nav ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        nav {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #388bfd, #a78bfa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 800;
        }
        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #e2e8f0; }

        /* ===== Hero ===== */
        .hero {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 160px 24px 80px;
            min-height: 100vh;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 100px;
            background: rgba(56,139,253,0.1);
            border: 1px solid rgba(56,139,253,0.25);
            color: #388bfd;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 32px;
        }
        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #388bfd;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        h1 {
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1.5px;
            max-width: 700px;
            background: linear-gradient(180deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
        }
        .subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: #94a3b8;
            max-width: 560px;
            line-height: 1.7;
            margin-bottom: 56px;
        }

        /* ===== Download Cards ===== */
        .downloads {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 640px;
        }
        .dl-card {
            flex: 1;
            min-width: 260px;
            max-width: 300px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 28px 36px;
            text-align: center;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .dl-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #388bfd, transparent);
            opacity: 0;
            transition: opacity 0.35s;
        }
        .dl-card:hover {
            border-color: rgba(56,139,253,0.3);
            background: rgba(56,139,253,0.06);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(56,139,253,0.1);
        }
        .dl-card:hover::before { opacity: 1; }

        .dl-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .dl-icon.windows {
            background: linear-gradient(135deg, rgba(0,120,215,0.15), rgba(0,120,215,0.05));
            color: #0078d7;
        }
        .dl-icon.android {
            background: linear-gradient(135deg, rgba(61,220,132,0.15), rgba(61,220,132,0.05));
            color: #3ddc84;
        }
        .dl-platform {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 6px;
        }
        .dl-desc {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s;
            cursor: pointer;
        }
        .dl-btn.win-btn {
            background: linear-gradient(135deg, #388bfd, #1d6be0);
            color: #fff;
            box-shadow: 0 4px 20px rgba(56,139,253,0.3);
        }
        .dl-btn.win-btn:hover {
            box-shadow: 0 6px 30px rgba(56,139,253,0.45);
            transform: translateY(-1px);
        }
        .dl-btn.and-btn {
            background: linear-gradient(135deg, #3ddc84, #2bb86a);
            color: #0b0f19;
            box-shadow: 0 4px 20px rgba(61,220,132,0.25);
        }
        .dl-btn.and-btn:hover {
            box-shadow: 0 6px 30px rgba(61,220,132,0.4);
            transform: translateY(-1px);
        }
        .dl-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ===== Features ===== */
        .features {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .feat {
            padding: 28px 24px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .feat:hover { border-color: rgba(255,255,255,0.12); }
        .feat-icon {
            font-size: 28px;
            margin-bottom: 14px;
        }
        .feat-title {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        .feat-desc {
            font-size: 13px;
            color: #64748b;
            line-height: 1.6;
        }

        /* ===== Footer ===== */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            color: #475569;
            font-size: 13px;
        }
        footer a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }
        footer a:hover { color: #94a3b8; }

        /* ===== Mobile ===== */
        @media (max-width: 600px) {
            .hero { padding: 140px 20px 60px; }
            .downloads { flex-direction: column; align-items: center; }
            .dl-card { max-width: 100%; }
        }
    </style>
</head>
